# Configuração exclusiva de teste (src/test/resources).
# Mescla-se com src/main/resources/application.properties durante os testes
# (o Dev Services sobe um Redis automaticamente; use-separate-server vem do main).
#
# O cliente gRPC de teste ("strings") aponta para o servidor unificado, que em
# @QuarkusTest escuta na porta HTTP de teste (8081).
quarkus.grpc.clients.strings.host=localhost
quarkus.grpc.clients.strings.port=8081
quarkus.grpc.clients.keys.host=localhost
quarkus.grpc.clients.keys.port=8081

# DEBUG nos testes para exercitar e observar os logs/MDC.
quarkus.log.category."io.github.claudineyns".level=DEBUG
