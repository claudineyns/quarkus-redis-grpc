# gRPC multiplexado no servidor HTTP unificado → porta única (DESIGN seção 7).
quarkus.grpc.server.use-separate-server=false

# Server Reflection habilitado por padrão em todos os ambientes (toggle) para
# permitir descoberta de serviços. A descoberta NÃO é aberta: é protegida pelo
# token opaco + TLS — o interceptor de token DEVE cobrir o reflection (DESIGN
# seção 6). Pode ser desligado por ambiente sobrepondo esta propriedade.
quarkus.grpc.server.enable-reflection-service=true

# Interface de management em porta separada (DESIGN seção 7): health (probes) e
# métricas Prometheus saem da porta de borda (gRPC) e passam para a 9000, interna.
quarkus.management.enabled=true
quarkus.management.port=9000

# --- TLS de borda (apenas em prod/OCP) — DESIGN seção 6 ---
# One-way TLS servido pelo pod (a Route é passthrough). O bucket "https" do
# tls-registry recebe os caminhos do cert/key por env var no Deployment
# (QUARKUS_TLS_HTTPS_KEY_STORE_PEM_PROXY_CERT/KEY → /var/certificados/servidor/).
%prod.quarkus.http.tls-configuration-name=https
%prod.quarkus.http.insecure-requests=disabled

# --- Logging (DESIGN seção 8.1) ---
# Pattern de console com o MDC (%X) renderizado em todas as linhas.
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %X %s%e%n
# DEBUG automático em dev (conveniência). Em prod/OCP liga-se por ambiente via
# QUARKUS_LOG_CATEGORY__IO_GITHUB_CLAUDINEYNS__LEVEL=DEBUG (default INFO).
%dev.quarkus.log.category."io.github.claudineyns".level=DEBUG
